name: Playwright AI Framework CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and Linux dependencies
        run: npx playwright install --with-deps

      - name: Clear healing logs
        run: npm run clear:healing

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      - name: Generate AI report
        run: npm run report:ai
        continue-on-error: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright-report/html-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/playwright-report/test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload AI healing logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-events
          path: reports/ai/healing-events.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload AI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-report
          path: reports/ai/ai-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload locator cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locator-cache
          path: storage/cache/locator-cache.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail workflow if tests failed
        if: always()
        run: |
          if [ -f "reports/playwright-report/test-results/.last-run.json" ]; then
            echo "Last run file found."
          fi